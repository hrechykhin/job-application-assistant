# Self-hosted production (EC2 etc.) — NOT used by Railway.
# Railway reads env vars from its dashboard directly.
#
# Usage: docker-compose -f docker-compose.prod.yml up -d

services:
  backend:
    image: ${BACKEND_IMAGE}
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env.prod
    volumes:
      - uploads_data:/app/uploads
    command: >
      sh -c "alembic upgrade head &&
             uvicorn app.main:app --host 0.0.0.0 --port 8000 --workers 2"

volumes:
  uploads_data:
